<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WikiPiki</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Linux Libertine', 'Georgia', serif;
    background: #f8f9fa;
    color: #202122;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  h1 {
    font-size: 2rem;
    margin-bottom: 4px;
    color: #202122;
    letter-spacing: 1px;
    font-weight: normal;
    border-bottom: 1px solid #a2a9b1;
    padding-bottom: 6px;
    width: 100%;
    max-width: 700px;
    text-align: center;
  }

  footer {
    width: 100%;
    max-width: 700px;
    background: #eaecf0;
    text-align: center;
    padding: 10px;
    font-size: 0.85rem;
    color: #54595d;
    margin-top: auto;
  }

  footer a {
    color: #3366cc;
    text-decoration: none;
  }

  footer a:hover {
    text-decoration: underline;
  }

  .img-card {
    position: relative;
    overflow: hidden;
  }

  .img-card.correct::after {
    content: "✓";
    position: absolute;
    top: 0; left: 0;
    font-size: 8rem;
    color: rgba(255,255,255,0.85);
    background: rgba(0, 180, 0, 0.45);
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .img-card.wrong::after {
    content: "✗";
    position: absolute;
    top: 0; left: 0;
    font-size: 8rem;
    color: rgba(255,255,255,0.85);
    background: rgba(220, 0, 0, 0.45);
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #subtitle {
    font-size: 1rem;
    color: #54595d;
    margin-bottom: 20px;
    font-style: italic;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 700px;
    margin-bottom: 15px;
    font-size: 1.1rem;
    background: #eaecf0;
    padding: 8px 16px;
    border-radius: 8px;
  }

  #lives { font-size: 1.4rem; }
  #streak-display { color: #54595d; font-size: 1rem; }

  #article-title {
    font-size: 1.5rem;
    font-weight: bold;
    text-align: center;
    margin-bottom: 10px;
    margin-top: 10px;
    color: #202122;
    background: #ffffff;
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid #a2a9b1;
    max-width: 700px;
    width: 100%;
  }

  #intro-box {
    background: #ffffff;
    padding: 12px 16px;
    border-radius: 4px;
    margin-bottom: 10px;
    max-width: 700px;
    width: 100%;
    font-size: 0.9rem;
    line-height: 1.6;
    color: #202122;
    display: none;
    border: 1px solid #a2a9b1;
    border-left: 4px solid #3366cc;
  }

  #images-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    max-width: 700px;
    width: 100%;
    margin-bottom: 20px;
  }

  .img-card {
    background: #ffffff;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 2px solid #a2a9b1;
  }

  .img-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(51,102,204,0.2);
    border-color: #3366cc;
  }

  .img-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: block;
  }

  .img-card.correct { border-color: #4caf50; animation: pulse-green 0.5s ease; }
  .img-card.wrong { border-color: #f44336; animation: shake 0.4s ease; }
  .img-card.reveal-correct { border-color: #4caf50; }

  @keyframes pulse-green {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

#hint-btn {
  background: #3366cc;
  color: white;
  border: 1px solid #3366cc;
  padding: 8px 18px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 1rem;
  margin-top: 15px;
  margin-bottom: 25px;
  font-family: arial;
  transition: transform 0.2s;
}

#hint-btn:hover:not(:disabled) {
  transform: scale(1.05);
}

#hint-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

  #loading {
    margin-top: 40px;
    color: #54595d;
    font-style: italic;
  }

  #gameover {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    background: #ffffff;
    border: 1px solid #a2a9b1;
    border-radius: 12px;
    padding: 32px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    margin-top: 20px;
  }

  #gameover h2 {
    font-size: 1.8rem;
    font-weight: normal;
    color: #202122;
  }

  #go-streak, #go-record { font-size: 1.1rem; color: #54595d; }

  #restart-btn {
    background: #3366cc;
    color: white;
    border: none;
    padding: 10px 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    font-family: inherit;
    transition: background 0.2s;
  }

  #restart-btn:hover { background: #2a55aa; }
</style>
</head>
<body>

<h1>WikiPiki</h1>
<div id="subtitle">Trouve l'image qui correspond à l'article !</div>

<div id="hud">
  <div id="lives">🎓🎓🎓</div>
  <div id="streak-display">Score : 0</div>
</div>

<div id="article-title">Chargement...</div>
<div id="intro-box"></div>
<button id="hint-btn">Afficher l'intro de l'article ? (-1🎓)</button>
<div id="images-grid"></div>
<div id="loading"></div>

<div id="gameover">
  <h2>💀 Partie terminée</h2>
  <div id="go-streak"></div>
  <div id="go-record"></div>
  <button id="restart-btn">🔄 Rejouer</button>
</div>

<script>
const LANG = navigator.language.startsWith("fr") ? "fr" : "en";
const API = `https://${LANG}.wikipedia.org/api/rest_v1`;
const WIKI_API = `https://${LANG}.wikipedia.org/w/api.php`;

let lives = 3;
let streak = 0;
let record = parseInt(localStorage.getItem("wikiphoto_record") || "0");
let correctImageUrl = "";
let answersLocked = false;
let hintUsed = false;

function updateHUD() {
  document.getElementById("lives").textContent = "🎓".repeat(lives) || "💀";
  document.getElementById("streak-display").textContent = `Score : ${streak}`;
}

function getImageCount() {
  if (streak >= 20) return 6;
  if (streak >= 10) return 5;
  if (streak >= 5)  return 4;
  return 3;
}

async function fetchRandomArticle() {
  const res = await fetch(`${API}/page/random/summary`);
  const data = await res.json();
  if (!data.thumbnail?.source) throw new Error("no image");
  return {
    title: data.title,
    intro: data.extract,
    image: data.thumbnail.source.replace(/\/\d+px-/, "/400px-")
  };
}

async function fetchRandomImages(count) {
  const images = [];
  const attempts = count * 4;
  for (let i = 0; i < attempts && images.length < count; i++) {
    try {
      const res = await fetch(`${API}/page/random/summary`);
      const data = await res.json();
      if (data.thumbnail?.source) {
        const url = data.thumbnail.source.replace(/\/\d+px-/, "/400px-");
        if (!images.includes(url)) images.push(url);
      }
    } catch {}
  }
  return images;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

async function loadRound() {
  answersLocked = false;
  hintUsed = false;

  document.getElementById("images-grid").innerHTML = "";
  document.getElementById("intro-box").style.display = "none";
  document.getElementById("gameover").style.display = "none";
  document.getElementById("hint-btn").style.display = "inline-block";
  document.getElementById("hint-btn").disabled = false;
  document.getElementById("loading").textContent = "Chargement...";

  try {
    const imageCount = getImageCount();
    const article = await fetchRandomArticle();
    correctImageUrl = article.image;

    const decoys = await fetchRandomImages(imageCount - 1);
    const allImages = shuffle([correctImageUrl, ...decoys.slice(0, imageCount - 1)]);

    document.getElementById("article-title").textContent = article.title;
    document.getElementById("loading").textContent = "";

    const grid = document.getElementById("images-grid");
    allImages.forEach(url => {
      const card = document.createElement("div");
      card.className = "img-card";
      const img = document.createElement("img");
      img.src = url;
      img.onerror = () => { card.style.display = "none"; };
      card.appendChild(img);
      card.onclick = () => handleAnswer(card, url);
      grid.appendChild(card);
    });

    document.getElementById("hint-btn").onclick = () => showHint(article.intro);

  } catch (e) {
    document.getElementById("loading").textContent = "Erreur de chargement, on réessaie...";
    setTimeout(loadRound, 2000);
  }
}

function showHint(intro) {
  if (hintUsed) return;
  hintUsed = true;
  document.getElementById("hint-btn").disabled = true;

  lives--;
  updateHUD();

  const box = document.getElementById("intro-box");
  box.style.display = "block";
  box.textContent = intro || "Pas d'intro disponible.";

  if (lives <= 0) {
    setTimeout(gameOver, 600);
  }
}

function handleAnswer(card, url) {
  if (answersLocked) return;

  if (url === correctImageUrl) {
    card.classList.add("correct");
    streak++;
    updateHUD();
    answersLocked = true;
    setTimeout(loadRound, 1200);
  } else {
    card.classList.add("wrong");
    lives--;
    updateHUD();

    if (lives <= 0) {
      revealCorrect();
      setTimeout(gameOver, 1200);
    }
  }
}

function revealCorrect() {
  document.querySelectorAll(".img-card").forEach(card => {
    const img = card.querySelector("img");
    if (img.src === correctImageUrl) {
      card.classList.add("reveal-correct");
    }
  });
}

function gameOver() {
  answersLocked = true;

  if (streak > record) {
    record = streak;
    localStorage.setItem("wikiphoto_record", record);
  }

  document.getElementById("images-grid").innerHTML = "";
  document.getElementById("article-title").textContent = "WikiPiki";
  document.getElementById("hint-btn").style.display = "none";
  document.getElementById("intro-box").style.display = "none";

  document.getElementById("go-streak").textContent = `Score : ${streak}`;
  document.getElementById("go-record").textContent = `Record : ${record}`;
  document.getElementById("gameover").style.display = "flex";

  document.getElementById("restart-btn").onclick = () => {
    lives = 3;
    streak = 0;
    updateHUD();
    loadRound();
  };
}

updateHUD();
loadRound();
</script>

<footer>
  Un jeu de déduction par <a href="https://www.instagram.com/patrick_baud" target="_blank">Patrick Baud</a>
</footer>
</body>
</html>
