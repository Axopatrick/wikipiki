<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WikiPiki</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Linux Libertine', 'Georgia', serif;
    background: #f8f9fa;
    color: #202122;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  h1 {
    font-size: 2rem;
    margin-bottom: 4px;
    color: #202122;
    letter-spacing: 1px;
    font-weight: normal;
    border-bottom: 1px solid #a2a9b1;
    padding-bottom: 6px;
    width: 100%;
    max-width: 700px;
    text-align: center;
  }

  footer {
    width: 100%;
    max-width: 700px;
    background: #eaecf0;
    text-align: center;
    padding: 10px;
    font-size: 0.85rem;
    color: #54595d;
    margin-top: auto;
    border-radius: 8px;
  }

  footer a {
    color: #3366cc;
    text-decoration: none;
  }

  footer a:hover {
    text-decoration: underline;
  }

  .img-card {
    position: relative;
    overflow: hidden;
  }

  .img-card.correct::after {
    content: "✅";
    position: absolute;
    top: 0; left: 0;
    font-size: 8rem;
    color: rgba(255,255,255,0.85);
    background: rgba(0, 180, 0, 0.45);
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .img-card.wrong::after {
    content: "❌";
    position: absolute;
    top: 0; left: 0;
    font-size: 8rem;
    color: rgba(255,255,255,0.85);
    background: rgba(220, 0, 0, 0.45);
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #subtitle {
    font-size: 1rem;
    color: #54595d;
    margin-bottom: 20px;
    font-style: italic;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 700px;
    margin-bottom: 15px;
    font-size: 1.1rem;
    background: #eaecf0;
    padding: 8px 16px;
    border-radius: 8px;
  }

  #lives { font-size: 1.4rem; }
  #streak-display { color: #54595d; font-size: 1rem; }

  #article-title {
    font-size: 1.5rem;
    font-weight: bold;
    text-align: center;
    margin-bottom: 10px;
    margin-top: 10px;
    color: #202122;
    background: #ffffff;
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid #a2a9b1;
    max-width: 700px;
    width: 100%;
  }

  #intro-box {
    background: #ffffff;
    padding: 12px 16px;
    border-radius: 4px;
    margin-bottom: 10px;
    max-width: 700px;
    width: 100%;
    font-size: 0.9rem;
    line-height: 1.6;
    color: #202122;
    display: none;
    border: 1px solid #a2a9b1;
    border-left: 4px solid #3366cc;
  }

  #images-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    max-width: 700px;
    width: 100%;
    margin-bottom: 20px;
  }

  .img-card {
    background: #ffffff;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 2px solid #a2a9b1;
  }

  .img-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(51,102,204,0.2);
    border-color: #3366cc;
  }

  .img-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: block;
  }

  .img-card.correct { border-color: #4caf50; animation: pulse-green 0.5s ease; }
  .img-card.wrong   { border-color: #f44336; animation: shake 0.4s ease; }
  .img-card.reveal-correct { border-color: #4caf50; }

  @keyframes pulse-green {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%     { transform: translateX(-8px); }
    75%     { transform: translateX(8px); }
  }

  #hint-btn {
    background: #3366cc;
    color: white;
    border: 1px solid #3366cc;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    margin-top: 15px;
    margin-bottom: 25px;
    font-family: arial;
    transition: transform 0.2s;
  }

  #hint-btn:hover:not(:disabled) { transform: scale(1.05); }

  #hint-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  #loading {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 40px;
    color: #54595d;
    font-style: italic;
  }

  #loading-icon {
    font-size: 3.5rem;
    animation: globePulse 1.5s ease-in-out infinite;
  }

  @keyframes globePulse {
    0%   { transform: scale(1);   opacity: 1; }
    50%  { transform: scale(1.2); opacity: 0.8; }
    100% { transform: scale(1);   opacity: 1; }
  }

  #gameover {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    background: #ffffff;
    border: 1px solid #a2a9b1;
    border-radius: 12px;
    padding: 32px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    margin-top: 0px;
  }

  #gameover h2 {
    font-size: 1.8rem;
    font-weight: normal;
    color: #202122;
  }

  #go-streak, #go-record { font-size: 1.1rem; color: #54595d; }

  @keyframes bounce-in {
    0%   { transform: scale(0);    opacity: 0; }
    60%  { transform: scale(1.15); opacity: 1; }
    80%  { transform: scale(0.95); }
    100% { transform: scale(1);    opacity: 1; }
  }

  .bounce-in { animation: bounce-in 0.6s ease forwards; }

  #restart-btn, #share-btn {
    background: #3366cc;
    color: white;
    border: none;
    padding: 10px 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    font-family: inherit;
    transition: background 0.2s;
  }

  #restart-btn:hover, #share-btn:hover { background: #2a55aa; }

  #share-btn           { background: #4caf50; }
  #share-btn:hover     { background: #388e3c; }

  #levelup-panel {
    display: none;
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    border-radius: 16px;
    padding: 40px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    z-index: 999;
    border: 2px solid #3366cc;
  }

  #levelup-panel h2 {
    font-size: 1.7rem;
    margin-bottom: 12px;
    font-weight: normal;
    color: #202122;
  }

  #levelup-panel p {
    font-size: 1.2rem;
    color: #54595d;
    font-style: italic;
  }
</style>
</head>
<body>

<h1>WikiPiki</h1>
<div id="subtitle"></div>

<div id="hud">
  <div id="lives">🎓🎓🎓</div>
  <div id="streak-display"></div>
</div>

<div id="article-title"></div>
<div id="intro-box"></div>
<button id="hint-btn"></button>
<div id="images-grid"></div>

<div id="loading">
  <span id="loading-icon">🌍</span>
  <span id="loading-text"></span>
</div>

<div id="levelup-panel">
  <div style="font-size: 3rem; margin-bottom: 8px;">🚀</div>
  <h2 id="levelup-title"></h2>
  <p id="levelup-msg"></p>
</div>

<div id="gameover">
  <div id="go-medal" style="font-size: 4rem; margin-bottom: 8px;"></div>
  <h2 id="gameover-title"></h2>
  <div id="go-streak"></div>
  <div id="go-record"></div>
  <button id="restart-btn"></button>
  <button id="share-btn"></button>
</div>

<script>
const LANG = navigator.language.startsWith("fr") ? "fr" : "en";
const API      = `https://${LANG}.wikipedia.org/api/rest_v1`;
const WIKI_API = `https://${LANG}.wikipedia.org/w/api.php`;

const T = {
  fr: {
    subtitle:     "Trouve l'image qui correspond à l'article !",
    score:        "Score",
    record:       "Record",
    loading:      "En train de fouiller Wikipedia...",
    retrying:     "Erreur de chargement, on réessaie...",
    hintBtn:      "Afficher l'intro de l'article ? (-1 point)",
    noIntro:      "Pas d'intro disponible.",
    gameoverTitle:"Partie terminée !",
    replay:       "🔄 Rejouer",
    share:        "📣 Partager",
    copied:       "Texte copié dans le presse-papier !",
    levelUp:      "Niveau supérieur!",
    levelUpMsg:   "On ajoute une image...",
    shareText: (s, r) =>
      `J'ai fait ${s} bonne${s>1?"s":""} réponse${s>1?"s":""} d'affilée à WikiPiki!\nMon record : ${r}\nEssaie de faire mieux 👉 https://axopatrick.github.io/wikipiki/`,
  },
  en: {
    subtitle:     "Find the image that matches the article!",
    score:        "Score",
    record:       "Record",
    loading:      "Browsing Wikipedia...",
    retrying:     "Loading error, retrying...",
    hintBtn:      "Show article intro? (-1 point)",
    noIntro:      "No intro available.",
    gameoverTitle:"Game Over!",
    replay:       "🔄 Play again",
    share:        "📣 Share",
    copied:       "Text copied to clipboard!",
    levelUp:      "Level up!",
    levelUpMsg:   "Adding a photo...",
    shareText: (s, r) =>
      `I got ${s} correct answer${s>1?"s":""} in a row on WikiPiki!\nMy record: ${r}\nCan you do better? 👉 https://axopatrick.github.io/wikipiki/`,
  }
}[LANG];

document.getElementById("subtitle").textContent       = T.subtitle;
document.getElementById("hint-btn").textContent       = T.hintBtn;
document.getElementById("gameover-title").textContent = T.gameoverTitle;
document.getElementById("restart-btn").textContent    = T.replay;
document.getElementById("share-btn").textContent      = T.share;
document.getElementById("levelup-title").textContent  = T.levelUp;
document.getElementById("levelup-msg").textContent    = T.levelUpMsg;

let lives    = 3;
let streak   = 0;
let record   = parseInt(localStorage.getItem("wikiphoto_record") || "0");
let correctImageUrl = "";
let answersLocked   = false;
let hintUsed        = false;

/* ── utilitaires UI ── */
function showLoading(msg) {
  document.getElementById("loading-text").textContent = msg;
  document.getElementById("loading").style.display = "flex";
}
function hideLoading() {
  document.getElementById("loading").style.display = "none";
}
function updateHUD() {
  document.getElementById("lives").textContent        = "🎓".repeat(lives) || "💀";
  document.getElementById("streak-display").textContent = `${T.score} : ${streak}`;
}
function getImageCount() {
  if (streak >= 20) return 6;
  if (streak >= 10) return 5;
  if (streak >= 5)  return 4;
  return 3;
}
function isLevelUp(s) { return s === 5 || s === 10 || s === 20; }
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ── vérifie qu'une image se charge, avec timeout ── */
// 🔑 FIX MOBILE : on abandonne après 5 s au lieu d'attendre indéfiniment
function imageLoads(url, timeout = 5000) {
  return new Promise(resolve => {
    const img = new Image();
    const timer = setTimeout(() => resolve(false), timeout);
    img.onload  = () => { clearTimeout(timer); resolve(true);  };
    img.onerror = () => { clearTimeout(timer); resolve(false); };
    img.src = url;
  });
}

/* ── fetch article aléatoire ── */
async function fetchRandomArticle() {
  const res  = await fetch(`${API}/page/random/summary`,
                           { signal: AbortSignal.timeout(8000) }); // 🔑 FIX MOBILE
  const data = await res.json();
  if (!data.thumbnail?.source) throw new Error("no image");
  return {
    title: data.title,
    intro: data.extract,
    image: data.thumbnail.source.replace(/\/\d+px-/, "/400px-")
  };
}

/* ── fetch images leurres ── */
async function fetchRandomImages(count) {
  const res = await fetch(
    WIKI_API + "?" + new URLSearchParams({
      action: "query", generator: "random",
      grnnamespace: 0, grnlimit: 50,
      prop: "pageimages", piprop: "thumbnail", pithumbsize: 400,
      format: "json", origin: "*"
    }),
    { signal: AbortSignal.timeout(8000) }  // 🔑 FIX MOBILE
  );
  const data  = await res.json();
  const pages = Object.values(data?.query?.pages || {});
  const urls  = pages.filter(p => p.thumbnail?.source).map(p => p.thumbnail.source);
  return shuffle(urls);
}

/* ── sons ── */
function playCorrectSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = "sine";
  osc.frequency.setValueAtTime(523, ctx.currentTime);
  osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
  osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
  osc.start(); osc.stop(ctx.currentTime + 0.5);
}
function playWrongSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = "sawtooth";
  osc.frequency.setValueAtTime(300, ctx.currentTime);
  osc.frequency.setValueAtTime(150, ctx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
  osc.start(); osc.stop(ctx.currentTime + 0.4);
}
function playGameOverSound() {
  const ctx   = new (window.AudioContext || window.webkitAudioContext)();
  const notes = [329.63, 293.66, 261.63, 220.00];
  const duree = 0.35;
  notes.forEach((freq, i) => {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = "sine"; osc.frequency.value = freq;
    const debut = ctx.currentTime + i * duree;
    const fin   = debut + duree;
    gain.gain.setValueAtTime(0, debut);
    gain.gain.linearRampToValueAtTime(0.4, debut + 0.02);
    gain.gain.linearRampToValueAtTime(0, fin);
    osc.start(debut); osc.stop(fin + 0.05);
  });
}

/* ── level-up ── */
function showLevelUpThenLoad() {
  const panel = document.getElementById("levelup-panel");
  panel.style.display = "block";
  setTimeout(() => { panel.style.display = "none"; loadRound(); }, 2000);
}

/* ══════════════════════════════════════════
   CHARGEMENT D'UN ROUND
   Changements clés :
   • imageLoads() a un timeout de 5 s
   • vérification article + leurres en parallèle
   • max 5 tentatives avant message d'erreur propre
   ══════════════════════════════════════════ */
async function loadRound(attempt = 1) {
  const MAX_ATTEMPTS = 5;

  answersLocked = false;
  hintUsed      = false;

  document.getElementById("images-grid").innerHTML    = "";
  document.getElementById("intro-box").style.display  = "none";
  document.getElementById("gameover").style.display   = "none";
  document.getElementById("article-title").style.display = "none";
  document.getElementById("hint-btn").style.display   = "none";
  showLoading(attempt === 1 ? T.loading : T.retrying);

  try {
    const imageCount = getImageCount();

    /* -- 1. article avec image valide -- */
    let article = null;
    // 🔑 FIX MOBILE : on tente plusieurs articles d'un coup (Promise.any)
    for (let tries = 0; tries < 5 && !article; tries++) {
      const candidates = await Promise.all(
        Array.from({ length: 3 }, fetchRandomArticle)
      );
      for (const c of candidates) {
        if (await imageLoads(c.image)) { article = c; break; }
      }
    }
    if (!article) throw new Error("no valid article");

    correctImageUrl = article.image;

    /* -- 2. images leurres valides -- */
    let decoys = [];
    // 🔑 FIX MOBILE : on vérifie toutes les URLs en parallèle
    for (let tries = 0; tries < 5 && decoys.length < imageCount - 1; tries++) {
      const urls     = await fetchRandomImages(imageCount + 20);
      const filtered = urls.filter(u => u !== correctImageUrl && !decoys.includes(u));
      const checks   = await Promise.all(filtered.map(u => imageLoads(u)));
      const valid    = filtered.filter((_, i) => checks[i]);
      decoys = [...decoys, ...valid].slice(0, imageCount - 1);
    }
    if (decoys.length < imageCount - 1) throw new Error("not enough decoys");

    /* -- 3. affichage -- */
    hideLoading();
    document.getElementById("article-title").textContent    = article.title;
    document.getElementById("article-title").style.display  = "block";
    document.getElementById("hint-btn").textContent         = T.hintBtn;
    document.getElementById("hint-btn").disabled            = false;
    document.getElementById("hint-btn").style.display       = "inline-block";
    document.getElementById("hint-btn").onclick = () => showHint(article.intro);

    const grid = document.getElementById("images-grid");
    shuffle([correctImageUrl, ...decoys]).forEach(url => {
      const card = document.createElement("div");
      card.className = "img-card";
      const img = document.createElement("img");
      img.src = url;
      card.appendChild(img);
      card.onclick = () => handleAnswer(card, url);
      grid.appendChild(card);
    });

  } catch (e) {
    if (attempt < MAX_ATTEMPTS) {
      // 🔑 FIX MOBILE : délai croissant entre tentatives
      setTimeout(() => loadRound(attempt + 1), attempt * 1500);
    } else {
      showLoading("⚠️ Impossible de charger. Vérifie ta connexion et rafraîchis la page.");
    }
  }
}

/* ── hint ── */
function showHint(intro) {
  if (hintUsed) return;
  hintUsed = true;
  document.getElementById("hint-btn").disabled = true;
  if (streak > 0) streak--;
  updateHUD();
  const box = document.getElementById("intro-box");
  box.style.display = "block";
  box.textContent   = intro || T.noIntro;
}

/* ── réponse ── */
function handleAnswer(card, url) {
  if (answersLocked) return;
  answersLocked = true;

  if (url === correctImageUrl) {
    playCorrectSound();
    card.classList.add("correct");
    streak++;
    updateHUD();
    if (isLevelUp(streak)) setTimeout(showLevelUpThenLoad, 1200);
    else                    setTimeout(loadRound, 1200);
  } else {
    playWrongSound();
    card.classList.add("wrong");
    lives--;
    updateHUD();
    if (lives <= 0) { revealCorrect(); setTimeout(gameOver, 1200); }
    else            { answersLocked = false; }
  }
}

function revealCorrect() {
  document.querySelectorAll(".img-card").forEach(card => {
    if (card.querySelector("img").src === correctImageUrl)
      card.classList.add("reveal-correct");
  });
}

/* ── game over ── */
function gameOver() {
  answersLocked = true;
  playGameOverSound();

  if (streak > record) {
    record = streak;
    localStorage.setItem("wikiphoto_record", record);
  }

  document.getElementById("images-grid").innerHTML    = "";
  document.getElementById("article-title").style.display = "none";
  document.getElementById("hint-btn").style.display   = "none";
  document.getElementById("intro-box").style.display  = "none";
  hideLoading();

  document.getElementById("go-streak").textContent = `${T.score} : ${streak}`;
  document.getElementById("go-record").textContent = `${T.record} : ${record}`;
  document.getElementById("go-medal").textContent  = streak < 10 ? "🥉" : streak < 20 ? "🥈" : "🥇";

  const panel = document.getElementById("gameover");
  panel.classList.remove("bounce-in");
  void panel.offsetWidth;
  panel.style.display = "flex";
  panel.classList.add("bounce-in");

  document.getElementById("restart-btn").onclick = () => {
    lives = 3; streak = 0;
    updateHUD(); loadRound();
  };
  document.getElementById("share-btn").onclick = () => {
    const text = T.shareText(streak, record);
    if (navigator.share) navigator.share({ text });
    else { navigator.clipboard.writeText(text); alert(T.copied); }
  };
}

updateHUD();
loadRound();
</script>

<footer>
  Un jeu de déduction par <a href="https://www.instagram.com/patrick_baud" target="_blank">Patrick Baud</a>
</footer>
</body>
</html>
